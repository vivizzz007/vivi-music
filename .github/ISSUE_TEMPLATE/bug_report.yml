name: 🐛 Bug Report
description: Something is broken? Help us fix it!
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛠️ Bug Report
        Thank you for reporting! Please fill out the form below.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I am running the [latest debug version](https://github.com/vivizzz007/vivi-music/actions).
          required: true
        - label: I checked for duplicate issues.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 📍 Where does the bug happen?
      description: Select the area of the app.
      options:
        - 🎵 Music Player (Now Playing)
        - 📚 Library / Playlists
        - 🔍 Search
        - ⚙️ Settings
        - 📥 Downloads
        - 🎨 UI / Visuals
        - 🔌 Integrations (Discord/LastFM)
        - 📱 Widgets / Notification
        - ❓ Other
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 📉 How often does it happen?
      options:
        - 🔴 Every time (100%)
        - 🟠 Often (> 50%)
        - 🟡 Sometimes (< 50%)
        - 🟢 Rarely (Once or twice)
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 🔄 Steps to Reproduce
      description: clear steps lead to a faster fix!
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: 🆚 Expected vs. Actual
      description: What happened vs. what should have happened.
      placeholder: |
        Expected: Music starts playing.
        Actual: App crashes immediately.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: dropdown
    id: android-version
    attributes:
      label: 🤖 Android Version
      options:
        - Android 16 (Preview)
        - Android 15
        - Android 14
        - Android 13
        - Android 12
        - Android 11
        - Android 10
        - Android 9 or older
        - Custom ROM
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: 📦 App Version
      placeholder: e.g. 5.0.3 (Check Settings -> About)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs / Screenshots
      description: Paste logs or drag & drop screenshots here.
      render: shell
