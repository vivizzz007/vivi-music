name: Nightly GMS Release Build

on:
  push:
    branches: [ 'main' ]
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
  schedule:
    - cron: '0 0 * * *' # Every night at 00:00 UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  build_nightly:
    name: Build Universal GMS Release
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Setup FFTW for Android
        uses: ./.github/actions/setup-fftw

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject JioSaavn Code
        env:
          JIOSAAVN_CODE: ${{ secrets.JIOSAAVN_CODE }}
        run: |
          if [ -z "$JIOSAAVN_CODE" ]; then
            echo "Warning: JIOSAAVN_CODE secret is empty!"
          else
            echo "$JIOSAAVN_CODE" > b64.txt
            base64 -d b64.txt > jiosaavn/src/main/kotlin/com/music/jiosaavn/SaavnService.kt
            rm b64.txt
            echo "JioSaavn injected successfully. File line count: $(wc -l < jiosaavn/src/main/kotlin/com/music/jiosaavn/SaavnService.kt)"
          fi

      - name: Inject Musixmatch Code
        env:
          MUSIXMATCH_CODE: ${{ secrets.MUSIXMATCH_CODE }}
        run: |
          if [ -z "$MUSIXMATCH_CODE" ]; then
            echo "Warning: MUSIXMATCH_CODE secret is empty!"
          else
            echo "$MUSIXMATCH_CODE" > b64_mm.txt
            base64 -d b64_mm.txt > musixmatch/src/main/kotlin/com/music/musixmatch/Musixmatch.kt
            rm b64_mm.txt
            echo "Musixmatch injected successfully. File line count: $(wc -l < musixmatch/src/main/kotlin/com/music/musixmatch/Musixmatch.kt)"
          fi


      - name: Generate debug.keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Universal GMS Release APK
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: |
          ./gradlew assembleUniversalGmsRelease -Pnightly=true --no-configuration-cache --console=plain --warning-mode summary -x lint

      - name: Sign APK
        id: sign_app
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/universalGms/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Prepare Artifact
        run: |
          mkdir -p app/build/outputs/apk/universalGms/release/out
          cp "${{ steps.sign_app.outputs.signedFile }}" app/build/outputs/apk/universalGms/release/out/vivi-music-gms-nightly.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: vivi-music-gms-nightly
          path: app/build/outputs/apk/universalGms/release/out/vivi-music-gms-nightly.apk
