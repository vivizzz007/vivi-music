name: CI & Debug Build

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
  pull_request:
    branches: [ '**' ]

jobs:
  build_debug:
    name: Build Universal GMS Debug
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject JioSaavn Code
        env:
          JIOSAAVN_CODE: ${{ secrets.JIOSAAVN_CODE }}
        run: |
          if [ -z "$JIOSAAVN_CODE" ]; then
            echo "Warning: JIOSAAVN_CODE secret is empty!"
          else
            echo "$JIOSAAVN_CODE" > b64.txt
            base64 -d b64.txt > jiosaavn/src/main/kotlin/com/music/jiosaavn/SaavnService.kt
            rm b64.txt
            echo "JioSaavn injected successfully. File line count: $(wc -l < jiosaavn/src/main/kotlin/com/music/jiosaavn/SaavnService.kt)"
          fi

      - name: Inject Musixmatch Code
        env:
          MUSIXMATCH_CODE: ${{ secrets.MUSIXMATCH_CODE }}
        run: |
          if [ -z "$MUSIXMATCH_CODE" ]; then
            echo "Warning: MUSIXMATCH_CODE secret is empty!"
          else
            echo "$MUSIXMATCH_CODE" > b64_mm.txt
            base64 -d b64_mm.txt > musixmatch/src/main/kotlin/com/music/musixmatch/Musixmatch.kt
            rm b64_mm.txt
            echo "Musixmatch injected successfully. File line count: $(wc -l < musixmatch/src/main/kotlin/com/music/musixmatch/Musixmatch.kt)"
          fi


      - name: Generate debug.keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: |
          ./gradlew assembleUniversalGmsDebug --no-configuration-cache --console=plain --warning-mode summary

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-universal-gms-debug
          path: app/build/outputs/apk/universalGms/debug/*.apk